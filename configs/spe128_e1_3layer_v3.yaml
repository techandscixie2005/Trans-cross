# SPE-128 E1-3Layer Diagnostic Ablation v3
# Tests whether deeper cross-modal interaction (3 intra-cross blocks)
# can rescue E1 performance vs E0 direct concat attention.
#
# v3 is NOT parameter-matched — it is a diagnostic capacity experiment.
#
# Changes from v2:
#   E1: 1 intra-cross block → 3 intra-cross blocks
#   Everything else (SPE-128, g0=-2, decoder, training) unchanged.

data:
  processed_dir: /data/home/sczc698/run/xxy/Trans-cross/data/processed
  max_smiles_len: 120

tokenizer:
  type: spe
  vocab_path: /data/home/sczc698/run/xxy/Trans-cross/data/processed/spe128_vocab.json
  target_vocab_size: 128
  min_frequency: 2
  prefix: spe128
  patch_size: 64
  use_modality_embedding: true
  use_absolute_position_embedding: true

shared:
  d_model: 128
  num_heads: 4
  decoder_layers: 2
  decoder_ffn_dim: 512
  dropout: 0.1

# E0: DirectConcat — unchanged from v2
e0_concat:
  encoder_layers: 6
  encoder_ffn_dim: 512

# E1: 3-layer intra-cross blocks
# Each block: intra self-attn + cross-attn + FFN per modality
# cross_gate_init=-2 -> alpha0≈0.119
e1_intra_cross:
  intra_cross_blocks: 3
  encoder_ffn_dim: 512
  cross_gate_init: -2.0

training:
  epochs: 50
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 1.0e-4
  warmup_steps: 500
  grad_clip: 1.0
  label_smoothing: 0.05
  seed: 42
  beam_size: 5

equality_constraint:
  max_relative_param_diff: 1.0  # v3 is diagnostic, not parameter-matched
